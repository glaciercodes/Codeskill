<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Auth Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo svg {
            width: 28px;
            height: 28px;
            color: white;
            stroke: white;
            fill: none;
            stroke-width: 2;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .email-display {
            color: #475569;
            font-size: 14px;
            margin-top: 8px;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .form-description {
            color: #475569;
            font-size: 14px;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        form {
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 24px;
        }

        .form-group-double {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        input {
            padding: 12px 16px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            color: #0f172a;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        input::placeholder {
            color: #94a3b8;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        .error-message {
            color: #dc2626;
            font-size: 14px;
            text-align: center;
            margin-bottom: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .form-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 16px;
        }

        .link-button {
            background: none;
            border: none;
            color: #2563eb;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: text-decoration 0.3s ease;
            font-family: inherit;
        }

        .link-button:hover {
            text-decoration: underline;
        }

        .submit-button {
            padding: 12px 32px;
            background-color: #2563eb;
            color: white;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-size: 16px;
            font-family: inherit;
        }

        .submit-button:hover {
            background-color: #1d4ed8;
        }

        .submit-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading State */
        .loading-container {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }

        .loading-container.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            margin-bottom: 32px;
            animation: spin 1s linear infinite;
        }

        .spinner svg {
            width: 100%;
            height: 100%;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: #475569;
            font-size: 18px;
            font-weight: 500;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            h1 {
                font-size: 28px;
            }

            .header {
                margin-bottom: 32px;
            }

            input {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
            </div>
            <h1 id="headerTitle">Sign in</h1>
            <div class="email-display" id="emailDisplay"></div>
        </div>

        <!-- Step 1: Email Form -->
        <div class="form-section active" id="step1">
            <p class="form-description">Use your email address. The information will be added to our system.</p>
            <form onsubmit="handleEmailNext(event)">
                <div class="form-group">
                    <input 
                        type="email" 
                        id="emailInput" 
                        placeholder="Email or phone" 
                        required
                    />
                </div>

                <div class="error-message" id="errorMessage"></div>

                <div class="form-actions">
                    <button type="button" class="link-button" onclick="goToStep(1)">Create account</button>
                    <button type="submit" class="submit-button">Next</button>
                </div>
            </form>
        </div>

        <!-- Step 2: School Details Form -->
        <div class="form-section" id="step2">
            <form onsubmit="handleSubmit(event)">
                <div class="form-group-double">
                    <input 
                        type="text" 
                        id="schoolInput" 
                        placeholder="School name" 
                        required
                    />
                    <input 
                        type="text" 
                        id="departmentInput" 
                        placeholder="Department" 
                        required
                    />
                </div>

                <div class="error-message" id="errorMessage2"></div>

                <div class="form-actions">
                    <button type="button" class="link-button" onclick="goToStep(1)">Back</button>
                    <button type="submit" class="submit-button" id="submitBtn">Next</button>
                </div>
            </form>
        </div>

        <!-- Loading State -->
        <div class="loading-container" id="loadingContainer">
            <div class="spinner">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2">
                    <circle cx="12" cy="12" r="10" opacity="0.25"></circle>
                    <path d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="#2563eb" opacity="0.75"></path>
                </svg>
            </div>
            <p class="loading-text">Processing your information...</p>
        </div>
    </div>

    <script type="module">
        // Import Firebase modules
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, addDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCXqNe_BDdh9WIJ9lyrFPeQ_-733qbXW4s",
            authDomain: "realinsightreport.firebaseapp.com",
            projectId: "realinsightreport",
            storageBucket: "realinsightreport.firebasestorage.app",
            messagingSenderId: "1083096764833",
            appId: "1:1083096764833:web:4b526f278471212ba43be0",
            measurementId: "G-6LHBN68HMH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global variables
        let currentStep = 1;
        let userEmail = '';

        // Step navigation
        window.goToStep = function(step) {
            currentStep = step;
            updateUI();
        };

        // Handle email submission
        window.handleEmailNext = function(event) {
            event.preventDefault();
            const emailInput = document.getElementById('emailInput');
            const errorMessage = document.getElementById('errorMessage');

            if (!emailInput.value.trim()) {
                errorMessage.textContent = 'Please enter your email';
                errorMessage.classList.add('show');
                return;
            }

            errorMessage.classList.remove('show');
            userEmail = emailInput.value;
            currentStep = 2;
            updateUI();
        };

        // Handle form submission
        window.handleSubmit = async function(event) {
            event.preventDefault();
            const schoolInput = document.getElementById('schoolInput');
            const departmentInput = document.getElementById('departmentInput');
            const errorMessage = document.getElementById('errorMessage2');
            const submitBtn = document.getElementById('submitBtn');

            if (!schoolInput.value.trim() || !departmentInput.value.trim()) {
                errorMessage.textContent = 'Please fill in all fields';
                errorMessage.classList.add('show');
                return;
            }

            errorMessage.classList.remove('show');
            submitBtn.disabled = true;

            try {
                // Add data to Firestore
                const docRef = await addDoc(collection(db, 'schools'), {
                    email: userEmail,
                    schoolName: schoolInput.value,
                    department: departmentInput.value,
                    timestamp: new Date()
                });

                console.log('Document written with ID: ', docRef.id);

                // Show loading state
                showLoadingState();
            } catch (error) {
                console.error('Error adding document: ', error);
                errorMessage.textContent = 'Failed to submit. Please try again.';
                errorMessage.classList.add('show');
                submitBtn.disabled = false;
            }
        };

        // Update UI based on current step
        function updateUI() {
            // Hide all form sections
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.remove('active');
            document.getElementById('loadingContainer').classList.remove('active');

            // Update header
            const headerTitle = document.getElementById('headerTitle');
            const emailDisplay = document.getElementById('emailDisplay');

            if (currentStep === 1) {
                document.getElementById('step1').classList.add('active');
                headerTitle.textContent = 'Sign in';
                emailDisplay.textContent = '';
                document.getElementById('emailInput').focus();
            } else if (currentStep === 2) {
                document.getElementById('step2').classList.add('active');
                headerTitle.textContent = 'Welcome';
                emailDisplay.textContent = userEmail;
                document.getElementById('schoolInput').focus();
            }
        }

        // Show loading state
        function showLoadingState() {
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.remove('active');
            document.getElementById('loadingContainer').classList.add('active');
        }
    </script>
</body>
</html>
